apiVersion: v1
kind: ConfigMap
metadata:
  name: smarttask-config
  namespace: default
data:
  supabase-url: "https://your-project.supabase.co"
---
apiVersion: v1
kind: Secret
metadata:
  name: smarttask-secrets
  namespace: default
type: Opaque
stringData:
  supabase-publishable-key: "your-publishable-key-here"
  google-api-key: "your-google-api-key-here"
